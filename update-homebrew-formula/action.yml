name: Update Homebrew Formula
description: Bump url, sha256, and version in a Homebrew tap formula after a release

inputs:
  github-token:
    description: GitHub token with write access to the tap repository
    required: false
    default: ""
  tap-repo:
    description: Tap repository (owner/repo, e.g. choihunchul/homebrew-tap)
    required: true
  formula-name:
    description: Formula name without .rb extension
    required: true
  formula-path:
    description: Formula path inside the tap repository
    required: false
    default: ""
  tap-branch:
    description: Branch in the tap repository to update
    required: false
    default: main
  download-url:
    description: Download URL for the release asset (supports {tag}, {version}, {owner}, {repo})
    required: false
    default: ""
  asset-name:
    description: Release asset filename; used to resolve download URL from GitHub Release
    required: false
    default: ""
  version:
    description: Version string (defaults to git tag, minus tag-prefix)
    required: false
    default: ""
  tag-prefix:
    description: Prefix stripped from git tag before version compare (e.g. v)
    required: false
    default: v
  sha256:
    description: SHA256 checksum (computed from download-url when empty)
    required: false
    default: ""
  verify-tag:
    description: Require a tag push and verify version matches tag
    required: false
    default: "true"
  commit-message:
    description: Commit message (supports {formula}, {version}, {tag})
    required: false
    default: ""
  create-pr:
    description: Create a pull request instead of pushing directly
    required: false
    default: "false"
  pr-base-branch:
    description: Base branch for pull request
    required: false
    default: main
  pr-branch-prefix:
    description: Prefix for the pull request branch name
    required: false
    default: bump-

outputs:
  version:
    description: Formula version
    value: ${{ steps.update.outputs.version }}
  tag:
    description: Git tag name
    value: ${{ steps.update.outputs.tag }}
  download-url:
    description: Resolved download URL
    value: ${{ steps.update.outputs.download-url }}
  sha256:
    description: SHA256 checksum
    value: ${{ steps.update.outputs.sha256 }}
  formula-path:
    description: Formula path inside the tap repository
    value: ${{ steps.update.outputs.formula-path }}
  commit-sha:
    description: Commit SHA in the tap repository
    value: ${{ steps.update.outputs.commit-sha }}
  pull-request-url:
    description: Pull request URL when create-pr is true
    value: ${{ steps.update.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Update Homebrew formula
      id: update
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        TAP_REPO: ${{ inputs.tap-repo }}
        FORMULA_NAME: ${{ inputs.formula-name }}
        FORMULA_PATH_INPUT: ${{ inputs.formula-path }}
        TAP_BRANCH: ${{ inputs.tap-branch }}
        DOWNLOAD_URL_INPUT: ${{ inputs.download-url }}
        ASSET_NAME: ${{ inputs.asset-name }}
        VERSION_INPUT: ${{ inputs.version }}
        TAG_PREFIX: ${{ inputs.tag-prefix }}
        SHA256_INPUT: ${{ inputs.sha256 }}
        VERIFY_TAG: ${{ inputs.verify-tag }}
        COMMIT_MESSAGE_INPUT: ${{ inputs.commit-message }}
        CREATE_PR: ${{ inputs.create-pr }}
        PR_BASE_BRANCH: ${{ inputs.pr-base-branch }}
        PR_BRANCH_PREFIX: ${{ inputs.pr-branch-prefix }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail

        if [[ "$GITHUB_REF" != refs/tags/* && "$VERIFY_TAG" == "true" ]]; then
          echo "Tag push required (got: $GITHUB_REF). Set verify-tag: false to skip." >&2
          exit 1
        fi

        RAW_TAG=""
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          RAW_TAG="${GITHUB_REF#refs/tags/}"
        fi

        VERSION="${VERSION_INPUT:-$RAW_TAG}"
        if [[ -n "$TAG_PREFIX" && "$VERSION" == "$TAG_PREFIX"* ]]; then
          VERSION="${VERSION#"$TAG_PREFIX"}"
        fi

        if [[ -z "$VERSION" ]]; then
          echo "version is required when not running on a tag push" >&2
          exit 1
        fi

        if [[ "$VERIFY_TAG" == "true" && -n "$VERSION_INPUT" ]]; then
          EXPECTED="$RAW_TAG"
          if [[ -n "$TAG_PREFIX" && "$EXPECTED" == "$TAG_PREFIX"* ]]; then
            EXPECTED="${EXPECTED#"$TAG_PREFIX"}"
          fi
          if [[ "$VERSION_INPUT" != "$EXPECTED" ]]; then
            echo "version ($VERSION_INPUT) does not match tag ($RAW_TAG)" >&2
            exit 1
          fi
        fi

        expand_template() {
          local value="$1"
          value="${value//\{tag\}/$RAW_TAG}"
          value="${value//\{version\}/$VERSION}"
          value="${value//\{owner\}/$GITHUB_REPOSITORY_OWNER}"
          value="${value//\{repo\}/${GITHUB_REPOSITORY#*/}}"
          printf '%s' "$value"
        }

        DOWNLOAD_URL="$DOWNLOAD_URL_INPUT"
        if [[ -n "$DOWNLOAD_URL" ]]; then
          DOWNLOAD_URL="$(expand_template "$DOWNLOAD_URL")"
        elif [[ -n "$ASSET_NAME" ]]; then
          if [[ -z "$RAW_TAG" ]]; then
            echo "asset-name requires a tag push" >&2
            exit 1
          fi
          DOWNLOAD_URL=$(gh release view "$RAW_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq ".assets[] | select(.name == \"$ASSET_NAME\") | .browser_download_url")
          if [[ -z "$DOWNLOAD_URL" ]]; then
            echo "Release asset not found: $ASSET_NAME (tag: $RAW_TAG)" >&2
            exit 1
          fi
        else
          echo "Either download-url or asset-name is required" >&2
          exit 1
        fi

        SHA256="$SHA256_INPUT"
        if [[ -z "$SHA256" ]]; then
          echo "Computing sha256 from $DOWNLOAD_URL"
          SHA256=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$DOWNLOAD_URL" | shasum -a 256 | awk '{print $1}')
        fi

        FORMULA_PATH="${FORMULA_PATH_INPUT:-Formula/${FORMULA_NAME}.rb}"
        WORKDIR=$(mktemp -d)
        trap 'rm -rf "$WORKDIR"' EXIT

        git clone --depth=1 -b "$TAP_BRANCH" \
          "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" \
          "$WORKDIR/tap"

        FORMULA_FILE="$WORKDIR/tap/$FORMULA_PATH"
        if [[ ! -f "$FORMULA_FILE" ]]; then
          echo "Formula not found: $FORMULA_PATH in $TAP_REPO" >&2
          exit 1
        fi

        ruby - "$FORMULA_FILE" "$DOWNLOAD_URL" "$SHA256" "$VERSION" <<'RUBY'
        formula_path, download_url, sha256, version = ARGV

        content = File.read(formula_path)
        updated = content.dup

        unless updated.sub!(/url "[^"]*"/, "url \"#{download_url}\"")
          abort "Formula is missing url field: #{formula_path}"
        end

        unless updated.sub!(/sha256 "[^"]*"/, "sha256 \"#{sha256}\"")
          abort "Formula is missing sha256 field: #{formula_path}"
        end

        if updated.match?(/^\s*version "/)
          updated.sub!(/version "[^"]*"/, "version \"#{version}\"")
        end

        File.write(formula_path, updated)
        RUBY

        cd "$WORKDIR/tap"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        COMMIT_MESSAGE="$COMMIT_MESSAGE_INPUT"
        if [[ -z "$COMMIT_MESSAGE" ]]; then
          COMMIT_MESSAGE="Bump ${FORMULA_NAME} to ${VERSION}"
        else
          COMMIT_MESSAGE="${COMMIT_MESSAGE//\{formula\}/$FORMULA_NAME}"
          COMMIT_MESSAGE="${COMMIT_MESSAGE//\{version\}/$VERSION}"
          COMMIT_MESSAGE="${COMMIT_MESSAGE//\{tag\}/$RAW_TAG}"
        fi

        git add "$FORMULA_PATH"

        if git diff --cached --quiet; then
          echo "Formula already up to date"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "download-url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "formula-path=$FORMULA_PATH" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        PR_URL=""
        COMMIT_SHA=""

        if [[ "$CREATE_PR" == "true" ]]; then
          PR_BRANCH="${PR_BRANCH_PREFIX}${FORMULA_NAME}-${VERSION}"
          git checkout -b "$PR_BRANCH"
          git commit -m "$COMMIT_MESSAGE"
          git push origin "HEAD:refs/heads/$PR_BRANCH"
          PR_URL=$(gh pr create \
            --repo "$TAP_REPO" \
            --base "$PR_BASE_BRANCH" \
            --head "$PR_BRANCH" \
            --title "$COMMIT_MESSAGE" \
            --body "Automated formula bump from ${GITHUB_REPOSITORY}@${RAW_TAG:-$VERSION}")
        else
          git commit -m "$COMMIT_MESSAGE"
          git push origin "HEAD:refs/heads/$TAP_BRANCH"
          COMMIT_SHA=$(git rev-parse HEAD)
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
        echo "download-url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
        echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
        echo "formula-path=$FORMULA_PATH" >> "$GITHUB_OUTPUT"
        echo "commit-sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
        echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"
