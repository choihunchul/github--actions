name: Publish Homebrew Formula

on:
  workflow_call:
    inputs:
      tap-repo:
        description: Tap repository (owner/repo)
        required: true
        type: string
      formula-name:
        description: Formula name without .rb extension
        required: true
        type: string
      formula-path:
        description: Formula path inside the tap repository
        required: false
        type: string
        default: ""
      tap-branch:
        description: Branch in the tap repository to update
        required: false
        type: string
        default: main
      release-repo:
        description: Source repository for release assets
        required: false
        type: string
        default: ""
      version:
        description: Version string
        required: false
        type: string
        default: ""
      tag:
        description: Git tag
        required: false
        type: string
        default: ""
      tag-prefix:
        description: Prefix stripped from git tag
        required: false
        type: string
        default: v
      verify-tag:
        description: Require a tag push when version/tag are not provided
        required: false
        type: boolean
        default: true
      desc:
        description: Formula description
        required: true
        type: string
      homepage:
        description: Formula homepage URL
        required: true
        type: string
      license:
        description: SPDX license identifier
        required: false
        type: string
        default: MIT
      binary-name:
        description: Binary filename inside release archives
        required: true
        type: string
      asset-macos-intel:
        description: macOS Intel release asset
        required: false
        type: string
        default: ""
      asset-macos-arm:
        description: macOS ARM release asset
        required: false
        type: string
        default: ""
      asset-linux-intel:
        description: Linux x86_64 release asset
        required: false
        type: string
        default: ""
      asset-linux-arm:
        description: Linux ARM64 release asset
        required: false
        type: string
        default: ""
      test-command:
        description: Optional Ruby test block line
        required: false
        type: string
        default: ""
      commit-message:
        description: Commit message
        required: false
        type: string
        default: ""
      create-pr:
        description: Create a pull request instead of pushing directly
        required: false
        type: boolean
        default: false
      pr-base-branch:
        description: Base branch for pull request
        required: false
        type: string
        default: main
      pr-branch-prefix:
        description: Prefix for the pull request branch name
        required: false
        type: string
        default: bump-
    secrets:
      HOMEBREW_TAP_TOKEN:
        description: GitHub token with write access to the tap repository
        required: false
    outputs:
      version:
        description: Formula version
        value: ${{ jobs.publish.outputs.version }}
      tag:
        description: Git tag name
        value: ${{ jobs.publish.outputs.tag }}
      formula-path:
        description: Formula path inside the tap repository
        value: ${{ jobs.publish.outputs.formula-path }}
      commit-sha:
        description: Commit SHA in the tap repository
        value: ${{ jobs.publish.outputs.commit-sha }}
      pull-request-url:
        description: Pull request URL when create-pr is true
        value: ${{ jobs.publish.outputs.pull-request-url }}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.publish.outputs.version }}
      tag: ${{ steps.publish.outputs.tag }}
      formula-path: ${{ steps.publish.outputs.formula-path }}
      commit-sha: ${{ steps.publish.outputs.commit-sha }}
      pull-request-url: ${{ steps.publish.outputs.pull-request-url }}
    steps:
      - name: Publish formula
        id: publish
        uses: choihunchul/github--actions/publish-homebrew-formula@main
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN != '' && secrets.HOMEBREW_TAP_TOKEN || github.token }}
          tap-repo: ${{ inputs.tap-repo }}
          formula-name: ${{ inputs.formula-name }}
          formula-path: ${{ inputs.formula-path }}
          tap-branch: ${{ inputs.tap-branch }}
          release-repo: ${{ inputs.release-repo }}
          version: ${{ inputs.version }}
          tag: ${{ inputs.tag }}
          tag-prefix: ${{ inputs.tag-prefix }}
          verify-tag: ${{ inputs.verify-tag }}
          desc: ${{ inputs.desc }}
          homepage: ${{ inputs.homepage }}
          license: ${{ inputs.license }}
          binary-name: ${{ inputs.binary-name }}
          asset-macos-intel: ${{ inputs.asset-macos-intel }}
          asset-macos-arm: ${{ inputs.asset-macos-arm }}
          asset-linux-intel: ${{ inputs.asset-linux-intel }}
          asset-linux-arm: ${{ inputs.asset-linux-arm }}
          test-command: ${{ inputs.test-command }}
          commit-message: ${{ inputs.commit-message }}
          create-pr: ${{ inputs.create-pr }}
          pr-base-branch: ${{ inputs.pr-base-branch }}
          pr-branch-prefix: ${{ inputs.pr-branch-prefix }}
