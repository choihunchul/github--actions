name: Publish Homebrew Formula
description: Generate or bump a multi-platform Homebrew tap formula from GitHub Release assets

inputs:
  github-token:
    description: GitHub token with write access to the tap repository
    required: false
    default: ""
  tap-repo:
    description: Tap repository (owner/repo)
    required: true
  formula-name:
    description: Formula name without .rb extension
    required: true
  formula-path:
    description: Formula path inside the tap repository
    required: false
    default: ""
  tap-branch:
    description: Branch in the tap repository to update
    required: false
    default: main
  release-repo:
    description: Source repository for release assets (defaults to github.repository)
    required: false
    default: ""
  version:
    description: Version string (defaults to git tag minus tag-prefix)
    required: false
    default: ""
  tag:
    description: Git tag (defaults to GITHUB_REF tag)
    required: false
    default: ""
  tag-prefix:
    description: Prefix stripped from git tag for version (e.g. v)
    required: false
    default: v
  verify-tag:
    description: Require a tag push when version/tag are not provided
    required: false
    default: "true"
  desc:
    description: Formula description
    required: true
  homepage:
    description: Formula homepage URL
    required: true
  license:
    description: SPDX license identifier
    required: false
    default: MIT
  binary-name:
    description: Binary filename inside release archives
    required: true
  asset-macos-intel:
    description: macOS Intel release asset ({tag}, {version} supported)
    required: false
    default: ""
  asset-macos-arm:
    description: macOS ARM release asset
    required: false
    default: ""
  asset-linux-intel:
    description: Linux x86_64 release asset
    required: false
    default: ""
  asset-linux-arm:
    description: Linux ARM64 release asset
    required: false
    default: ""
  test-command:
    description: Optional shell command for test block (e.g. lazyifconfig --version)
    required: false
    default: ""
  commit-message:
    description: Commit message ({formula}, {version}, {tag})
    required: false
    default: ""
  create-pr:
    description: Create a pull request instead of pushing directly
    required: false
    default: "false"
  pr-base-branch:
    description: Base branch for pull request
    required: false
    default: main
  pr-branch-prefix:
    description: Prefix for the pull request branch name
    required: false
    default: bump-

outputs:
  version:
    description: Formula version
    value: ${{ steps.publish.outputs.version }}
  tag:
    description: Git tag name
    value: ${{ steps.publish.outputs.tag }}
  formula-path:
    description: Formula path inside the tap repository
    value: ${{ steps.publish.outputs.formula-path }}
  commit-sha:
    description: Commit SHA in the tap repository
    value: ${{ steps.publish.outputs.commit-sha }}
  pull-request-url:
    description: Pull request URL when create-pr is true
    value: ${{ steps.publish.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Publish Homebrew formula
      id: publish
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        TAP_REPO: ${{ inputs.tap-repo }}
        FORMULA_NAME: ${{ inputs.formula-name }}
        FORMULA_PATH_INPUT: ${{ inputs.formula-path }}
        TAP_BRANCH: ${{ inputs.tap-branch }}
        RELEASE_REPO: ${{ inputs.release-repo != '' && inputs.release-repo || github.repository }}
        VERSION_INPUT: ${{ inputs.version }}
        TAG_INPUT: ${{ inputs.tag }}
        TAG_PREFIX: ${{ inputs.tag-prefix }}
        VERIFY_TAG: ${{ inputs.verify-tag }}
        FORMULA_DESC: ${{ inputs.desc }}
        FORMULA_HOMEPAGE: ${{ inputs.homepage }}
        FORMULA_LICENSE: ${{ inputs.license }}
        BINARY_NAME: ${{ inputs.binary-name }}
        ASSET_MACOS_INTEL: ${{ inputs.asset-macos-intel }}
        ASSET_MACOS_ARM: ${{ inputs.asset-macos-arm }}
        ASSET_LINUX_INTEL: ${{ inputs.asset-linux-intel }}
        ASSET_LINUX_ARM: ${{ inputs.asset-linux-arm }}
        TEST_COMMAND: ${{ inputs.test-command }}
        COMMIT_MESSAGE_INPUT: ${{ inputs.commit-message }}
        CREATE_PR: ${{ inputs.create-pr }}
        PR_BASE_BRANCH: ${{ inputs.pr-base-branch }}
        PR_BRANCH_PREFIX: ${{ inputs.pr-branch-prefix }}
      run: |
        set -euo pipefail

        RAW_TAG="$TAG_INPUT"
        if [[ -z "$RAW_TAG" && "$GITHUB_REF" == refs/tags/* ]]; then
          RAW_TAG="${GITHUB_REF#refs/tags/}"
        fi

        if [[ -z "$RAW_TAG" && -z "$VERSION_INPUT" && "$VERIFY_TAG" == "true" ]]; then
          echo "tag or version is required (got ref: $GITHUB_REF)" >&2
          exit 1
        fi

        if [[ -z "$RAW_TAG" && -n "$VERSION_INPUT" ]]; then
          RAW_TAG="${TAG_PREFIX}${VERSION_INPUT}"
        fi

        VERSION="${VERSION_INPUT:-$RAW_TAG}"
        if [[ -n "$TAG_PREFIX" && "$VERSION" == "$TAG_PREFIX"* ]]; then
          VERSION="${VERSION#"$TAG_PREFIX"}"
        fi

        if [[ -z "$VERSION" ]]; then
          echo "version could not be resolved" >&2
          exit 1
        fi

        if [[ -z "$ASSET_MACOS_INTEL$ASSET_MACOS_ARM$ASSET_LINUX_INTEL$ASSET_LINUX_ARM" ]]; then
          echo "At least one platform asset input is required" >&2
          exit 1
        fi

        expand_template() {
          local value="$1"
          value="${value//\{tag\}/$RAW_TAG}"
          value="${value//\{version\}/$VERSION}"
          printf '%s' "$value"
        }

        sha256_for_url() {
          local url="$1"
          echo "Computing sha256 from $url" >&2
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$url" | shasum -a 256 | awk '{print $1}'
        }

        resolve_asset() {
          local asset_template="$1"
          local asset_name url sha
          asset_name="$(expand_template "$asset_template")"
          url=$(gh release view "$RAW_TAG" \
            --repo "$RELEASE_REPO" \
            --json assets \
            --jq ".assets[] | select(.name == \"$asset_name\") | .browser_download_url")
          if [[ -z "$url" ]]; then
            url="https://github.com/${RELEASE_REPO}/releases/download/${RAW_TAG}/${asset_name}"
          fi
          sha=$(sha256_for_url "$url")
          printf '%s|%s' "$url" "$sha"
        }

        FORMULA_PATH="${FORMULA_PATH_INPUT:-Formula/${FORMULA_NAME}.rb}"
        CLASS_NAME="$(ruby -e "puts '${FORMULA_NAME}'.split(/[-_]/).map(&:capitalize).join")"
        WORKDIR=$(mktemp -d)
        trap 'rm -rf "$WORKDIR"' EXIT

        FORMULA_BODY="$WORKDIR/formula.rb"
        {
          echo "class ${CLASS_NAME} < Formula"
          echo "  desc \"${FORMULA_DESC}\""
          echo "  homepage \"${FORMULA_HOMEPAGE}\""
          echo "  license \"${FORMULA_LICENSE}\""
          echo "  version \"${VERSION}\""
          echo

          if [[ -n "$ASSET_MACOS_INTEL$ASSET_MACOS_ARM" ]]; then
            echo "  on_macos do"
            if [[ -n "$ASSET_MACOS_INTEL" ]]; then
              IFS='|' read -r URL SHA <<< "$(resolve_asset "$ASSET_MACOS_INTEL")"
              echo "    on_intel do"
              echo "      url \"${URL}\""
              echo "      sha256 \"${SHA}\""
              echo "    end"
              echo
            fi
            if [[ -n "$ASSET_MACOS_ARM" ]]; then
              IFS='|' read -r URL SHA <<< "$(resolve_asset "$ASSET_MACOS_ARM")"
              echo "    on_arm do"
              echo "      url \"${URL}\""
              echo "      sha256 \"${SHA}\""
              echo "    end"
              echo
            fi
            echo "  end"
            echo
          fi

          if [[ -n "$ASSET_LINUX_INTEL$ASSET_LINUX_ARM" ]]; then
            echo "  on_linux do"
            if [[ -n "$ASSET_LINUX_INTEL" ]]; then
              IFS='|' read -r URL SHA <<< "$(resolve_asset "$ASSET_LINUX_INTEL")"
              echo "    on_intel do"
              echo "      url \"${URL}\""
              echo "      sha256 \"${SHA}\""
              echo "    end"
              echo
            fi
            if [[ -n "$ASSET_LINUX_ARM" ]]; then
              IFS='|' read -r URL SHA <<< "$(resolve_asset "$ASSET_LINUX_ARM")"
              echo "    on_arm do"
              echo "      url \"${URL}\""
              echo "      sha256 \"${SHA}\""
              echo "    end"
              echo
            fi
            echo "  end"
            echo
          fi

          echo "  def install"
          echo "    bin.install \"${BINARY_NAME}\""
          echo "  end"
          echo
          echo "  test do"
          if [[ -n "$TEST_COMMAND" ]]; then
            TEST_LINE="${TEST_COMMAND//\{bin\}/\"#{bin}/${BINARY_NAME}\"}"
            echo "    ${TEST_LINE}"
          else
            echo "    assert_predicate bin/\"${BINARY_NAME}\", :exist?"
          fi
          echo "  end"
          echo "end"
        } > "$FORMULA_BODY"

        git clone --depth=1 -b "$TAP_BRANCH" \
          "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" \
          "$WORKDIR/tap"

        mkdir -p "$(dirname "$WORKDIR/tap/$FORMULA_PATH")"
        cp "$FORMULA_BODY" "$WORKDIR/tap/$FORMULA_PATH"

        cd "$WORKDIR/tap"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        COMMIT_MESSAGE="$COMMIT_MESSAGE_INPUT"
        if [[ -z "$COMMIT_MESSAGE" ]]; then
          COMMIT_MESSAGE="Bump ${FORMULA_NAME} to ${VERSION}"
        else
          COMMIT_MESSAGE="${COMMIT_MESSAGE//\{formula\}/$FORMULA_NAME}"
          COMMIT_MESSAGE="${COMMIT_MESSAGE//\{version\}/$VERSION}"
          COMMIT_MESSAGE="${COMMIT_MESSAGE//\{tag\}/$RAW_TAG}"
        fi

        git add "$FORMULA_PATH"

        if git diff --cached --quiet; then
          echo "Formula already up to date"
        else
          PR_URL=""
          COMMIT_SHA=""

          if [[ "$CREATE_PR" == "true" ]]; then
            PR_BRANCH="${PR_BRANCH_PREFIX}${FORMULA_NAME}-${VERSION}"
            git checkout -b "$PR_BRANCH"
            git commit -m "$COMMIT_MESSAGE"
            git push origin "HEAD:refs/heads/$PR_BRANCH"
            PR_URL=$(gh pr create \
              --repo "$TAP_REPO" \
              --base "$PR_BASE_BRANCH" \
              --head "$PR_BRANCH" \
              --title "$COMMIT_MESSAGE" \
              --body "Automated formula publish from ${RELEASE_REPO}@${RAW_TAG}")
          else
            git commit -m "$COMMIT_MESSAGE"
            git push origin "HEAD:refs/heads/$TAP_BRANCH"
            COMMIT_SHA=$(git rev-parse HEAD)
          fi

          echo "commit-sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
        echo "formula-path=$FORMULA_PATH" >> "$GITHUB_OUTPUT"
